name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check Python syntax
        run: |
          python -c "
          import ast, os
          ok=0; err=0
          for r,d,fl in os.walk('worldsim'):
              for f in fl:
                  if f.endswith('.py'):
                      p = os.path.join(r,f)
                      try: ast.parse(open(p).read()); ok+=1
                      except SyntaxError as e:
                          print(f'FAIL: {p} - {e}'); err+=1
          for f in ['run_demo.py'] + [os.path.join('tests',f) for f in os.listdir('tests') if f.endswith('.py')]:
              try: ast.parse(open(f).read()); ok+=1
              except SyntaxError as e:
                  print(f'FAIL: {f} - {e}'); err+=1
          print(f'{ok} files OK, {err} errors')
          exit(1 if err > 0 else 0)
          "

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t worldsim-backend .
      - name: Build frontend image
        run: docker build -t worldsim-frontend ./frontend

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install frontend
        run: cd frontend && npm install
      - name: Check JS syntax
        run: find frontend/src -name '*.js' -exec node --check {} \;
